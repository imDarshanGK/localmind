name: Docs Regression & Link Check

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"
      - "scripts/collect_docs_metrics.py"
      - "tests/test_collect_docs_metrics.py"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"
      - "scripts/collect_docs_metrics.py"
      - "tests/test_collect_docs_metrics.py"

jobs:
  validate-docs:
    name: Regression Check - Markdown & Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Markdown Lint (Syntax Regression)
        run: |
          npx markdownlint-cli "docs/**/*.md" "README.md" --config .markdownlint.json --ignore "node_modules"

      - name: Check Broken Links (Deploy Readiness Check)
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          check-modified-files-only: "yes"
          base-branch: "main"

      # --- ADDED FOR ISSUE #929: observability metrics for build & deploy docs ---
      # Collects observable signals about the docs build (file count, size,
      # headings, links, code blocks, BOMs) and emits them as Prometheus text.
      # Also writes a baseline JSON file as a workflow artifact so a future
      # --baseline run can detect drift between deploys.
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect docs metrics (Prometheus + JSON)
        run: |
          mkdir -p artifacts
          python scripts/collect_docs_metrics.py --prometheus --json > artifacts/docs_metrics.json
          cat artifacts/docs_metrics.json

      - name: Upload docs metrics as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-metrics-${{ github.sha }}
          path: artifacts/docs_metrics.json
          retention-days: 30

      - name: Run docs metrics tests
        run: |
          python -m pip install --quiet pytest
          python -m pytest tests/test_collect_docs_metrics.py -q
      