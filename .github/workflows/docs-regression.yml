name: Docs Regression & Link Check

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"
      - "scripts/recover_docs_build.py"
      - "tests/test_recover_docs_build.py"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"
      - "scripts/recover_docs_build.py"
      - "tests/test_recover_docs_build.py"

jobs:
  validate-docs:
    name: Regression Check - Markdown & Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Markdown Lint (Syntax Regression)
        run: |
          npx markdownlint-cli "docs/**/*.md" "README.md" --config .markdownlint.json --ignore "node_modules"

      - name: Check Broken Links (Deploy Readiness Check)
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          check-modified-files-only: "yes"
          base-branch: "main"

      # --- ADDED FOR ISSUE #930: failure recovery for build & deploy docs ---
      # Detects documented failure modes (BOM, CRLF, trailing whitespace,
      # missing final newline, duplicate headings, empty files, broken
      # baselines, circular links, U+FFFD). Auto-repairs what it can;
      # fails the build on remaining manual-action failures.
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run docs build failure-recovery check
        run: |
          python scripts/recover_docs_build.py --check

      - name: Run docs build failure-recovery tests
        run: |
          python -m pip install --quiet pytest
          python -m pytest tests/test_recover_docs_build.py -q
      