name: Docs Regression & Link Check

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"
      - "scripts/dedupe_docs.py"
      - "tests/test_dedupe_docs.py"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"
      - "scripts/dedupe_docs.py"
      - "tests/test_dedupe_docs.py"

jobs:
  validate-docs:
    name: Regression Check - Markdown & Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Markdown Lint (Syntax Regression)
        run: |
          npx markdownlint-cli "docs/**/*.md" "README.md" --config .markdownlint.json --ignore "node_modules"

      - name: Check Broken Links (Deploy Readiness Check)
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          check-modified-files-only: "yes"
          base-branch: "main"

      # --- ADDED FOR ISSUE #928: dedupe logic for build & deploy docs ---
      # Fails the build if duplicate anchors, headings, ref-link labels, or
      # byte-identical docs are detected. See docs/dedupe-docs.md for details.
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run docs dedupe check
        run: |
          python scripts/dedupe_docs.py --check

      - name: Run docs dedupe tests
        run: |
          python -m pip install --quiet pytest
          python -m pytest tests/test_dedupe_docs.py -q
      