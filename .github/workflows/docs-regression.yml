name: Docs Regression & Link Check

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"

jobs:
  validate-docs:
    name: Regression Check - Markdown & Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Markdown Lint (Syntax Regression)
        run: |
          npx markdownlint-cli "docs/**/*.md" "README.md" --config .markdownlint.json --ignore "node_modules"

      - name: Check Broken Links (Deploy Readiness Check)
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: ".github/workflows/link-check-config.json"
          check-modified-files-only: "yes"
